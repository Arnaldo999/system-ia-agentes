server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint para Coolify
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Ruta principal del CRM modelo — compat con URL Vercel actual
    location = /dev/crm-v2 {
        try_files /dev/crm-v2.html =404;
    }
    location = /dev/crm-v2.html {
        try_files /dev/crm-v2.html =404;
    }

    # JS bundles
    location /dev/js/ {
        alias /usr/share/nginx/html/dev/js/;
        try_files $uri =404;
    }

    # Catch-all: crm.lovbot.ai/?tenant=X funciona igual que en Vercel
    location / {
        try_files $uri /dev/crm-v2.html;
    }

    # Headers de seguridad básicos
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
}
