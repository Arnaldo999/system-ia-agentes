<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #2d6a4f;

}

#quienes { background: var(--blanco); }
.quienes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }

#loteos { background: var(--crema); }
.filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
.filtro-btn { padding: 8px 20px; border-radius: 50px; border: 2px solid var(--crema-dark); background: var(--blanco); cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--muted); transition: .2s; font-family: 'DM Sans', sans-serif; }

.loteos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
.lote-card { background: var(--blanco); border-radius: var(--radio); overflow: hidden; box-shadow: var(--sombra); transition: transform .25s, box-shadow .25s; cursor: pointer; }

.lote-badge { position: absolute; bottom: 10px; left: 10px; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-disponible { background: #d8f3dc; color: #1b4332; }

.lote-zona { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
.lote-precio { font-size: 1.25rem; font-weight: 700; color: var(--verde); margin-bottom: 14px; }
.lote-datos { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.lote-dato { font-size: 0.78rem; color: var(--muted); }
.lote-actions { display: flex; gap: 8px; }
.btn-lote { flex: 1; padding: 9px; border-radius: 8px; text-align: center; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: .2s; border: none; font-family: 'DM Sans', sans-serif; }
.btn-lote-primary { background: var(--verde); color: var(--blanco); }
.btn-lote-primary:hover { background: #1e4d37; }

.btn-lote-secondary:hover { background: #b7e4c7; }
.loteos-loading { grid-column: 1/-1; text-align: center; padding: 60px 0; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--verde-light); border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loteos-empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--blanco); border-radius: 16px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-img { height: 240px; overflow: hidden; border-radius: 16px 16px 0 0; background: var(--verde-light); }

.modal-body { padding: 24px; }
.modal-body h2 { font-size: 1.4rem; margin-bottom: 6px; }
.modal-zona { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
.modal-precio { font-size: 1.6rem; font-weight: 700; color: var(--verde); margin-bottom: 16px; }

.modal-btn { flex: 1; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: .2s; border: none; font-family: 'DM Sans', sans-serif; }
.modal-btn-primary { background: #25D366; color: var(--blanco); }
.modal-btn-primary:hover { background: #1ebe5a; }
.modal-btn-secondary { background: var(--verde-light); color: var(--verde); }
.modal-btn-secondary:hover { background: #b7e4c7; }
.modal-close { position: sticky; top: 0; float: right; background: rgba(255,255,255,0.9); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; color: var(--muted); margin: 12px 12px 0 0; z-index: 1; display: flex; align-items: center; justify-content: center; }
#blog-preview { background: var(--blanco); }
.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
.blog-card { border-radius: var(--radio); overflow: hidden; border: 1px solid var(--crema-dark); transition: transform .25s, box-shadow .25s; }
.blog-card:hover { transform: translateY(-3px); box-shadow: var(--sombra); }
.blog-img { height: 170px; background: linear-gradient(135deg, var(--verde-light), #b7e4c7); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.blog-body { padding: 18px; }
.blog-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--verde); margin-bottom: 8px; }
.blog-body h3 { font-size: 0.95rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
.blog-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
.blog-footer { display: flex; justify-content: space-between; align-items: center; }
.blog-date { font-size: 0.75rem; color: var(--muted); }
.blog-link { font-size: 0.8rem; font-weight: 600; color: var(--verde); }
.blog-cta { text-align: center; margin-top: 40px; }
.btn-blog-mas { display: inline-block; padding: 12px 36px; border-radius: 50px; background: var(--verde); color: var(--blanco); font-weight: 600; font-size: 0.95rem; transition: background .2s; }
.btn-blog-mas:hover { background: #1e4d37; }
#testimonios { background: var(--verde); overflow: hidden; }

#testimonios .section-sub { color: rgba(255,255,255,0.75); }
.slider-wrap { position: relative; }
.slider-track { display: flex; transition: transform 0.5s cubic-bezier(.4,0,.2,1); }
.testimonio-slide { min-width: 100%; padding: 0 4px; }
.testimonio-card { background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 36px 40px; max-width: 700px; margin: 0 auto; text-align: center; backdrop-filter: blur(4px); }
.testimonio-stars { font-size: 1.2rem; margin-bottom: 16px; letter-spacing: 3px; }
.testimonio-texto { font-size: clamp(1rem, 2vw, 1.2rem); color: rgba(255,255,255,0.92); line-height: 1.75; font-style: italic; margin-bottom: 24px; font-family: 'Raleway', sans-serif; }
.testimonio-autor { display: flex; align-items: center; justify-content: center; gap: 12px; }
.testimonio-avatar { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: var(--blanco); border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }
.testimonio-nombre strong { display: block; color: var(--blanco); font-weight: 600; font-size: 0.95rem; }
.testimonio-nombre span { font-size: 0.78rem; color: rgba(255,255,255,0.6); }
.slider-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 32px; }
.slider-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: var(--blanco); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.slider-btn:hover { background: rgba(255,255,255,0.25); }

.slider-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: .2s; border: none; }
.slider-dot.active { background: var(--blanco); width: 24px; border-radius: 4px; }
#contacto { background: var(--crema); }
.contacto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
.contacto-info { display: flex; flex-direction: column; gap: 20px; }
.contacto-item { display: flex; gap: 14px; align-items: flex-start; }
.contacto-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--verde-light); color: var(--verde); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.contacto-item h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; }
.contacto-item p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
.contacto-form { background: var(--blanco); border-radius: var(--radio); padding: 32px; box-shadow: var(--sombra); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1.5px solid var(--crema-dark); background: var(--crema); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--texto); transition: border-color .2s; outline: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--verde); background: var(--blanco); }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn-form { width: 100%; padding: 13px; border-radius: 10px; background: var(--verde); color: var(--blanco); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .2s; }
.btn-form:hover { background: #1e4d37; }
.form-success { display: none; text-align: center; padding: 20px; color: var(--verde); font-weight: 600; }

/* ── LAYOUT ELEMENTOR ───────────────────────────────── */
.elementor-page .site-content, .elementor-page #primary, .elementor-page #content, .ast-container { padding: 0 !important; max-width: 100% !important; }
#inicio { margin-top: -135px; padding-top: 135px; }
html, body { max-width: 100% !important; overflow-x: hidden !important; }
body:not(.elementor-editor-active) { padding-top: 135px; }

/* ── HEADER ─────────────────────────────────────────── */
.back-header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(245,240,232,0.97); border-bottom: 1px solid #ede8de; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 9999; font-family: 'DM Sans', sans-serif; }
body.elementor-editor-active .back-header { position: static !important; z-index: 1 !important; }
.back-container { max-width: 1300px; margin: 0 auto; padding: 0 5%; height: 135px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.back-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.back-logo img { height: 135px; width: auto; }
.back-logo-text strong { display: block; font-family: 'Raleway',sans-serif; font-size: 1.05rem; font-weight: 700; color: #2d6a4f; line-height: 1.2; }
.back-logo-text span { font-size: 0.58rem; color: #6b7280; letter-spacing: 1px; text-transform: uppercase; }
.back-nav { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }
.back-nav a { font-size: 0.875rem; font-weight: 500; color: #2c2c2c; text-decoration: none; padding: 8px 10px; border-radius: 6px; }
.back-nav a:hover { color: #2d6a4f; }
.back-nav .btn-contacto { background: #2d6a4f; color: white !important; padding: 9px 22px; border-radius: 50px; font-weight: 600; }

/* ── BURGER ─────────────────────────────────────────── */
.back-burger { display: none; flex-direction: column; justify-content: center; align-items: center; width: 42px; height: 42px; border: none; background: none; cursor: pointer; border-radius: 10px; transition: background .2s; padding: 0; z-index: 10001; position: relative; }
.back-burger:hover { background: rgba(45,106,79,0.08); }
.back-burger span { width: 22px; height: 2px; background: #2d6a4f; border-radius: 2px; display: block; transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .25s, width .25s; transform-origin: center; }
.back-burger span:nth-child(1) { margin-bottom: 5px; }
.back-burger span:nth-child(2) { margin-bottom: 5px; }
.back-burger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.back-burger.active span:nth-child(2) { opacity: 0; width: 0; }
.back-burger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── MENÚ MOBILE FULLSCREEN ─────────────────────────── */
.back-mobile { position: fixed; inset: 0; z-index: 9990; background: rgba(245,240,232,0.98); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); display: flex; flex-direction: column; opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.985); transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1), visibility 0s linear .32s; }
.back-mobile.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1), visibility 0s; }
.back-mobile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #2d6a4f 0%, #52b788 50%, #2d6a4f 100%); background-size: 200% 100%; animation: gradShift 3s linear infinite; }
@keyframes gradShift { from { background-position: 0% 0%; } to { background-position: 200% 0%; } }
.back-mobile-inner { display: flex; flex-direction: column; height: 100%; padding: 0 24px 36px; overflow-y: auto; }
.back-mobile-head { display: flex; align-items: center; justify-content: space-between; height: 80px; flex-shrink: 0; }
.back-mobile-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.back-mobile-brand img { height: 46px; width: auto; }
.back-mobile-brand strong { display: block; font-family: 'Raleway', sans-serif; font-size: 0.9rem; font-weight: 700; color: #2d6a4f; }
.back-mobile-brand em { display: block; font-style: normal; font-size: 0.53rem; color: #9ca3af; letter-spacing: 1.5px; text-transform: uppercase; }
.back-mobile-x { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #ede8de; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; color: #9ca3af; transition: background .2s, color .2s, transform .25s; box-shadow: 0 2px 8px rgba(0,0,0,0.07); flex-shrink: 0; }
.back-mobile-x:hover { background: #2d6a4f; color: #fff; transform: rotate(90deg); }
.back-mobile-sep { height: 1px; background: linear-gradient(90deg, transparent, #e5e0d8 20%, #e5e0d8 80%, transparent); margin-bottom: 28px; flex-shrink: 0; }
.back-mobile-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.back-mobile-nav a { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-radius: 14px; text-decoration: none; font-size: 1rem; font-weight: 600; color: #2c2c2c; transition: background .2s, color .2s, transform .15s; opacity: 0; transform: translateX(-16px); }
.back-mobile.active .back-mobile-nav a { opacity: 1; transform: translateX(0); }
.back-mobile.active .back-mobile-nav a:nth-child(1) { transition: opacity .3s .10s, transform .3s .10s, background .2s, color .2s; }
.back-mobile.active .back-mobile-nav a:nth-child(2) { transition: opacity .3s .16s, transform .3s .16s, background .2s, color .2s; }
