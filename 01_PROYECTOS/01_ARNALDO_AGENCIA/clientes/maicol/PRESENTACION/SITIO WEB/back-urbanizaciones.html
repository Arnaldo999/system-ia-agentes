<style>
/* ── BURGER ─────────────────────────────────────────── */
.back-burger {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 42px; height: 42px;
  border: none; background: none; cursor: pointer;
  border-radius: 10px;
  transition: background .2s;
  padding: 0;
  z-index: 10001;
  position: relative;
}
.back-burger:hover { background: rgba(45,106,79,0.08); }
.back-burger span {
  width: 22px; height: 2px;
  background: #2d6a4f; border-radius: 2px;
  display: block;
  transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .25s, width .25s;
  transform-origin: center;
}
.back-burger span:nth-child(1) { margin-bottom: 5px; }
.back-burger span:nth-child(2) { margin-bottom: 5px; }
.back-burger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.back-burger.active span:nth-child(2) { opacity: 0; width: 0; }
.back-burger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── MENÚ MOBILE FULLSCREEN ─────────────────────────── */
.back-mobile {
  position: fixed;
  inset: 0;
  z-index: 9990;

  /* Glass morphism sobre crema */
  background: rgba(245,240,232,0.98);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);

  display: flex;
  flex-direction: column;

  /* Estado CERRADO */
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px) scale(0.985);
  transition:
    opacity .32s cubic-bezier(.4,0,.2,1),
    transform .32s cubic-bezier(.4,0,.2,1),
    visibility 0s linear .32s;
}
.back-mobile.active {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
  transition:
    opacity .32s cubic-bezier(.4,0,.2,1),
    transform .32s cubic-bezier(.4,0,.2,1),
    visibility 0s;
}

/* Línea de color arriba */
.back-mobile::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #2d6a4f 0%, #52b788 50%, #2d6a4f 100%);
  background-size: 200% 100%;
  animation: gradShift 3s linear infinite;
}
@keyframes gradShift {
  from { background-position: 0% 0%; }
  to   { background-position: 200% 0%; }
}

/* Interior con padding */
.back-mobile-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 0 24px 36px;
  overflow-y: auto;
}

/* Cabecera: logo + X */
.back-mobile-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
  flex-shrink: 0;
}
.back-mobile-brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.back-mobile-brand img { height: 46px; width: auto; }
.back-mobile-brand strong {
  display: block;
  font-family: 'Raleway', sans-serif;
  font-size: 0.9rem; font-weight: 700; color: #2d6a4f;
}
.back-mobile-brand em {
  display: block;
  font-style: normal;
  font-size: 0.53rem; color: #9ca3af;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.back-mobile-x {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid #ede8de;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; color: #9ca3af;
  transition: background .2s, color .2s, transform .25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  flex-shrink: 0;
}
.back-mobile-x:hover { background: #2d6a4f; color: #fff; transform: rotate(90deg); }

/* Línea separadora */
.back-mobile-sep {
  height: 1px;
  background: linear-gradient(90deg, transparent, #e5e0d8 20%, #e5e0d8 80%, transparent);
  margin-bottom: 28px;
  flex-shrink: 0;
}

/* Items de navegación */
.back-mobile-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.back-mobile-nav a {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  border-radius: 14px;
  text-decoration: none;
  font-size: 1rem;
  font-weight: 600;
  color: #2c2c2c;
  transition: background .2s, color .2s, transform .15s;

  /* Stagger de entrada */
  opacity: 0;
  transform: translateX(-16px);
}
.back-mobile.active .back-mobile-nav a {
  opacity: 1; transform: translateX(0);
}
.back-mobile.active .back-mobile-nav a:nth-child(1) { transition: opacity .3s .10s, transform .3s .10s, background .2s, color .2s; }
.back-mobile.active .back-mobile-nav a:nth-child(2) { transition: opacity .3s .16s, transform .3s .16s, background .2s, color .2s; }
.back-mobile.active .back-mobile-nav a:nth-child(3) { transition: opacity .3s .22s, transform .3s .22s, background .2s, color .2s; }
.back-mobile.active .back-mobile-nav a:nth-child(4) { transition: opacity .3s .28s, transform .3s .28s, background .2s, color .2s; }
.back-mobile.active .back-mobile-nav a:nth-child(5) { transition: opacity .3s .34s, transform .3s .34s, background .2s, color .2s; }

.back-mobile-nav a:hover { background: rgba(45,106,79,0.07); color: #2d6a4f; transform: translateX(4px); }

.mnav-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: #f0ece4;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  border: 1px solid #e8e3db;
  transition: background .2s;
}
.back-mobile-nav a:hover .mnav-icon { background: #d8f3dc; border-color: #52b788; }

.mnav-arrow {
  margin-left: auto;
  font-size: 0.85rem;
  color: #d1ccc4;
  transition: transform .2s, color .2s;
}
.back-mobile-nav a:hover .mnav-arrow { transform: translateX(3px); color: #2d6a4f; }

/* Footer del panel */
.back-mobile-foot {
  margin-top: 24px;
  flex-shrink: 0;
  opacity: 0;
  transform: translateY(10px);
}
.back-mobile.active .back-mobile-foot {
  opacity: 1; transform: translateY(0);
  transition: opacity .3s .40s, transform .3s .40s;
}

.btn-m-wa {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
  background: linear-gradient(135deg, #25D366 0%, #1db954 100%);
  color: #fff;
  font-size: 0.95rem; font-weight: 700;
  text-decoration: none;
  box-shadow: 0 6px 20px rgba(37,211,102,0.32);
  transition: transform .2s, box-shadow .2s;
  margin-bottom: 10px;
}
.btn-m-wa:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.42); }

.btn-m-contacto {
  display: block; width: 100%;
  padding: 13px 20px;
  border-radius: 14px;
  background: #2d6a4f; color: #fff;
  font-size: 0.9rem; font-weight: 600;
  text-align: center; text-decoration: none;
  transition: background .2s, transform .2s;
}
.btn-m-contacto:hover { background: #1e4d37; transform: translateY(-1px); }

.back-mobile-tag {
  text-align: center;
  margin-top: 14px;
  font-size: 0.68rem; color: #b0aaa0;
  letter-spacing: 0.5px;
}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 768px) {
  .back-nav    { display: none !important; }
  .back-burger { display: flex !important; }
  .back-logo img      { height: 55px !important; }
  .back-container     { height: 80px !important; }
}
body.menu-open { overflow: hidden; }
</style>

<script>
(function() {
  var menu, burger;

  function open() {
    menu.classList.add('active');
    burger.classList.add('active');
    document.body.classList.add('menu-open');
  }
  function close() {
    menu.classList.remove('active');
    burger.classList.remove('active');
    document.body.classList.remove('menu-open');
  }

  document.addEventListener('DOMContentLoaded', function() {
    menu   = document.getElementById('backMobile');
    burger = document.querySelector('.back-burger');
    if (!menu || !burger) return;

    burger.addEventListener('click', function() {
      menu.classList.contains('active') ? close() : open();
    });

    // Botón X interior
    document.getElementById('mClose').addEventListener('click', close);

    // Click en link → cerrar
    menu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', close);
    });

    // ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') close();
    });
  });
})();
</script>
