<script>
(function() {
  var menu, burger;
  function open() { menu.classList.add('active'); burger.classList.add('active'); document.body.classList.add('menu-open'); }
  function close() { menu.classList.remove('active'); burger.classList.remove('active'); document.body.classList.remove('menu-open'); }
  document.addEventListener('DOMContentLoaded', function() {
    menu   = document.getElementById('backMobile');
    burger = document.querySelector('.back-burger');
    if (!menu || !burger) return;
    burger.addEventListener('click', function() { menu.classList.contains('active') ? close() : open(); });
    document.getElementById('mClose').addEventListener('click', close);
    menu.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', close); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
  });
})();
</script>
