<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Interactivo - Casa Electrónica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --surface: #ffffff;
            --background: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: var(--text-main);
        }

        header {
            background-color: var(--surface);
            padding: 2rem 5%;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary);
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 5%;
        }

        /* Controles de filtro */
        .filtros {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-filtro {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-filtro.activo, .btn-filtro:hover {
            background: var(--primary);
            color: white;
        }

        /* Galería (Grid) */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img-container {
            height: 250px;
            overflow: hidden;
            position: relative;
            background: #e2e8f0;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            backdrop-filter: blur(4px);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            line-height: 1.4;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .card-footer {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-comprar {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
        }

        .btn-comprar:hover {
            opacity: 0.9;
        }

        /* Cargando */
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-muted);
            padding: 3rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="shop-title">Cargando Tienda...</h1>
        <p>Sincronizado en tiempo real con nuestra Inteligencia Artificial</p>
    </header>

    <div class="container">
        <div class="filtros" id="filtros-container">
            <!-- Los botones de filtro se generan por JS -->
        </div>

        <div id="loading" class="loading">Sincronizando catálogo con Airtable...</div>
        
        <div class="galeria" id="galeria-container">
            <!-- Las tarjetas se generan por JS -->
        </div>
    </div>

    <script>
        // =========================================================================
        // ⚠️ IMPORTANTE: REEMPLAZAR ESTA URL POR LA DE TU RENDER
        // Ejemplo: "https://cerebro-system-ia.onrender.com/comercio/catalogo"
        // =========================================================================
        const API_URL = "https://system-ia-agentes.onrender.com/comercio/catalogo"; 

        // Variables globales
        let todosLosProductos = [];
        let categoriasUnicas = new Set();
        const numeroWhatsApp = "5493764815689"; // Reemplazar por número del comercio conectado a Evolution API

        // Elementos del DOM
        const galeria = document.getElementById('galeria-container');
        const filtros = document.getElementById('filtros-container');
        const loading = document.getElementById('loading');
        const shopTitle = document.getElementById('shop-title');

        // Inicializar
        async function init() {
            try {
                // Fetch a tu propio FastAPI (que lee de Airtable)
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Error en la conexión");
                const data = await res.json();

                shopTitle.textContent = data.tienda || "Catálogo Oficial";
                todosLosProductos = data.productos || [];

                if(todosLosProductos.length === 0) {
                    loading.textContent = "No hay productos disponibles por el momento.";
                    return;
                }

                loading.style.display = 'none';

                // Extraer categorías
                todosLosProductos.forEach(p => categoriasUnicas.add(p.categoria));

                renderFiltros();
                renderProductos(todosLosProductos);

            } catch (error) {
                loading.textContent = "Error al cargar el catálogo. Verificá que el servidor FastAPI esté corriendo.";
                console.error(error);
            }
        }

        // Renderizar botones de filtro
        function renderFiltros() {
            // Botón "Todos"
            filtros.innerHTML = `<button class="btn-filtro activo" onclick="filtrar('Todos')">Todos</button>`;
            
            // Botones por categoría
            categoriasUnicas.forEach(cat => {
                const nombreCat = Array.isArray(cat) ? cat[0] : cat; // Por si Airtable manda array
                filtros.innerHTML += `<button class="btn-filtro" onclick="filtrar('${nombreCat}')">${nombreCat}</button>`;
            });
        }

        // Filtrar productos
        window.filtrar = function(catBuscada) {
            // Cambiar clase activo
            document.querySelectorAll('.btn-filtro').forEach(btn => {
                btn.classList.remove('activo');
                if(btn.textContent === catBuscada) btn.classList.add('activo');
            });

            // Renderizar
            if(catBuscada === 'Todos') {
                renderProductos(todosLosProductos);
            } else {
                const filtrados = todosLosProductos.filter(p => {
                    const nombreCat = Array.isArray(p.categoria) ? p.categoria[0] : p.categoria;
                    return nombreCat === catBuscada;
                });
                renderProductos(filtrados);
            }
        }

        // Renderizar tarjetas
        function renderProductos(productos) {
            galeria.innerHTML = "";
            productos.forEach(p => {
                // Formatear precio (ej: 450000 -> 450.000)
                const precioFormat = new Intl.NumberFormat('es-AR').format(p.precio);
                
                // Categoría limpia
                const nombreCat = Array.isArray(p.categoria) ? p.categoria[0] : p.categoria;

                // Enlace de WhatsApp pre-armado
                const urlWhatsapp = `https://wa.me/${numeroWhatsApp}?text=Hola,%20me%20interesa%20el%20producto:%20*${encodeURIComponent(p.nombre)}*.%20¿Tienen%20stock?`;

                const cardHtml = `
                    <div class="card">
                        <div class="card-img-container">
                            <span class="card-tag">${nombreCat || 'General'}</span>
                            <img class="card-img" src="${p.imagen_thumb || p.imagen || 'https://via.placeholder.com/400x300?text=Sin+Imagen'}" alt="${p.nombre}">
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${p.nombre}</h3>
                            <p class="card-desc">${p.descripcion || ''}</p>
                            <div class="card-footer">
                                <span class="card-price">$${precioFormat}</span>
                                <a href="${urlWhatsapp}" target="_blank" class="btn-comprar">Consultar</a>
                            </div>
                        </div>
                    </div>
                `;
                galeria.innerHTML += cardHtml;
            });
        }

        // Arrancar
        init();
    </script>
</body>
</html>
